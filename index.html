<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiqueta</title>
<style>
  @media screen {
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .preview-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .preview-container h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #333;
    }
    .preview-container p {
      margin: 0 0 20px 0;
      font-size: 14px;
      color: #666;
    }
    .label-preview {
      border: 1px dashed #ccc;
      padding: 10px;
      margin-bottom: 20px;
      display: inline-block;
    }
    .btn-print {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-print:hover {
      background: #1d4ed8;
    }
    .error {
      color: #dc2626;
      font-size: 16px;
    }
  }

  /* Etiqueta: 97.5mm x 12mm */
  .label {
    width: 97.5mm;
    height: 12mm;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1mm;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  .label-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
    min-width: 0;
    gap: 0.3mm;
  }
  .label-nome {
    font-size: 2.2mm;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .label-detalhes {
    font-size: 2mm;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .label-valor {
    font-size: 2.5mm;
    font-weight: bold;
    white-space: nowrap;
    line-height: 1.2;
  }
  .label-qr {
    width: 10mm;
    height: 10mm;
    flex-shrink: 0;
    margin-left: 1mm;
  }
  .label-qr img {
    width: 100%;
    height: 100%;
  }

  @media print {
    @page {
      size: 97.5mm 12mm;
      margin: 0;
    }
    body {
      margin: 0;
      padding: 0;
    }
    .preview-container,
    .preview-container h2,
    .preview-container p,
    .btn-print,
    .label-preview,
    .no-print {
      display: none !important;
    }
    .label {
      width: 97.5mm;
      height: 12mm;
      position: absolute;
      top: 0;
      left: 0;
    }
  }
</style>
</head>
<body>

<div class="preview-container">
  <h2>Etiqueta de Joia</h2>
  <p id="subtitle">Visualize e imprima a etiqueta</p>

  <div class="label-preview">
    <div class="label" id="label">
      <!-- preenchido por JS -->
    </div>
  </div>

  <br>
  <button class="btn-print" onclick="window.print()">Imprimir</button>
</div>

<!-- Label fora do container pra impressao -->
<div class="label" id="label-print" style="display:none">
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const nome = params.get('nome') || '';
  const peso = params.get('peso') || '';
  const ref = params.get('ref') || '';
  const id = params.get('id') || '';

  if (!nome) {
    document.getElementById('label').innerHTML = '<span class="error">Dados da peca nao encontrados na URL</span>';
  } else {
    const qrData = id || `${nome}|${peso}|${ref}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;

    const labelHTML = `
      <div class="label-info">
        <div class="label-nome">${nome}</div>
        <div class="label-detalhes">${peso} cts</div>
        <div class="label-valor">R$ ${ref}</div>
      </div>
      <div class="label-qr">
        <img src="${qrUrl}" alt="QR">
      </div>
    `;

    document.getElementById('label').innerHTML = labelHTML;
    document.getElementById('label-print').innerHTML = labelHTML;
    document.getElementById('subtitle').textContent = `${nome} — ${peso} cts — R$ ${ref}`;
  }

  // Na impressao, mostra o label-print
  window.addEventListener('beforeprint', () => {
    document.getElementById('label-print').style.display = 'flex';
  });
  window.addEventListener('afterprint', () => {
    document.getElementById('label-print').style.display = 'none';
  });
</script>

</body>
</html>
